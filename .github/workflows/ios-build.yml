name: iOS Build

on:
  push:
    branches: [claude/codex-work-review-xwwfz5, main]
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          echo "Installed Xcodes:"
          ls -d /Applications/Xcode*.app 2>/dev/null || true
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST/Contents/Developer"
          fi
          xcodebuild -version
          echo "--- Simulator SDKs ---"
          xcodebuild -showsdks | grep -i simulator || true

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project ios/MomHome.xcodeproj \
            -scheme MomHome \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
