<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mom Home Verb Stack</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f1e9;
        --paper: #fffdf8;
        --ink: #171b1a;
        --muted: #66716d;
        --line: #d9ded6;
        --do: #087c72;
        --buy: #b87512;
        --take: #315fbc;
        --watch: #bd4f66;
        --help: #7657c8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 80% 14%, rgba(8, 124, 114, 0.14), transparent 28%),
          radial-gradient(circle at 15% 82%, rgba(118, 87, 200, 0.10), transparent 32%),
          #dfe4dd;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button {
        font: inherit;
      }

      .phone {
        width: min(100vw, 430px);
        min-height: 100vh;
        position: relative;
        overflow: hidden;
        background: var(--bg);
        box-shadow: 0 28px 90px rgba(23, 27, 26, 0.2);
      }

      .app {
        min-height: 100vh;
        padding: 18px 16px 104px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .kicker {
        color: var(--do);
        font-size: 11px;
        font-weight: 950;
        letter-spacing: 0.09em;
        text-transform: uppercase;
      }

      h1 {
        margin-top: 4px;
        font-size: 31px;
        line-height: 1.02;
      }

      .subtitle {
        margin-top: 6px;
        max-width: 310px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
      }

      .add {
        width: 52px;
        height: 52px;
        border: 0;
        border-radius: 8px;
        background: var(--ink);
        color: white;
        font-size: 28px;
        font-weight: 950;
      }

      .sentence {
        margin-top: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.72);
        padding: 13px;
      }

      .sentence span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .sentence strong {
        display: block;
        margin-top: 7px;
        font-size: 26px;
        line-height: 1.1;
      }

      .verb-stack {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }

      .verb-row {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        overflow: hidden;
      }

      .verb-button {
        width: 100%;
        min-height: 64px;
        display: grid;
        grid-template-columns: 72px 1fr auto;
        gap: 10px;
        align-items: center;
        border: 0;
        background: transparent;
        color: var(--ink);
        padding: 10px 12px;
        text-align: left;
      }

      .verb-code {
        font-size: 22px;
        font-weight: 950;
        letter-spacing: 0.03em;
      }

      .verb-button strong {
        display: block;
        font-size: 16px;
        line-height: 1.18;
      }

      .verb-button span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.25;
      }

      .count {
        min-width: 34px;
        min-height: 34px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: #eef2ed;
        font-size: 12px;
        font-weight: 950;
      }

      .verb-row.active {
        border-color: var(--accent);
        box-shadow: inset 6px 0 0 var(--accent);
      }

      .options {
        display: none;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: rgba(23, 27, 26, 0.1);
        border-top: 1px solid rgba(23, 27, 26, 0.1);
      }

      .verb-row.active .options {
        display: grid;
      }

      .option {
        min-height: 66px;
        border: 0;
        background: #fbfaf4;
        color: var(--ink);
        padding: 11px;
        text-align: left;
      }

      .option strong {
        display: block;
        font-size: 14px;
        line-height: 1.15;
      }

      .option span {
        display: block;
        margin-top: 5px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.25;
      }

      .dossier {
        margin-top: 14px;
        border-radius: 8px;
        background: var(--ink);
        color: white;
        overflow: hidden;
      }

      .dossier-head {
        padding: 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      }

      .dossier h2 {
        font-size: 21px;
        line-height: 1.1;
      }

      .dossier p {
        margin-top: 6px;
        color: rgba(255, 255, 255, 0.68);
        font-size: 13px;
        line-height: 1.4;
      }

      .dossier-actions {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        background: rgba(255, 255, 255, 0.12);
      }

      .dossier-actions button {
        min-height: 48px;
        border: 0;
        background: rgba(255, 255, 255, 0.07);
        color: white;
        font-size: 12px;
        font-weight: 950;
      }

      .nav {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 4px;
        padding: 9px 9px 13px;
        border-top: 1px solid var(--line);
        background: rgba(255, 253, 248, 0.9);
        backdrop-filter: blur(18px);
      }

      .nav button {
        min-height: 52px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-weight: 950;
      }

      .nav .active {
        background: var(--ink);
        color: white;
      }

      @media (min-width: 520px) {
        body {
          padding: 28px;
        }

        .phone {
          min-height: 930px;
          border-radius: 30px;
        }
      }
    </style>
  </head>
  <body>
    <main class="phone" aria-label="Verb Stack concept">
      <div class="app">
        <header class="topbar">
          <div>
            <p class="kicker">Verb Stack</p>
            <h1>I want to...</h1>
            <p class="subtitle">A command-language home screen. Pick the verb, then the app offers exact next moves.</p>
          </div>
          <button class="add" aria-label="Add">+</button>
        </header>

        <section class="sentence">
          <span>Current sentence</span>
          <strong id="sentence">I want to do what is ready.</strong>
        </section>

        <section class="verb-stack" id="stack" aria-label="Action verbs"></section>

        <section class="dossier" aria-live="polite">
          <div class="dossier-head">
            <h2 id="dossierTitle">Do without planning the day.</h2>
            <p id="dossierText">Ready tasks, stars, flags, project unlocks, and quick wins stay together under one plain verb.</p>
          </div>
          <div class="dossier-actions">
            <button id="actionA">Open</button>
            <button id="actionB">Ask AI</button>
            <button id="actionC">Send</button>
          </div>
        </section>
      </div>

      <nav class="nav" aria-label="Main navigation">
        <button class="active">Today</button>
        <button>Tasks</button>
        <button>Calendar</button>
        <button>Items</button>
        <button>More</button>
      </nav>
    </main>

    <script>
      const verbs = {
        do: {
          accent: "var(--do)",
          code: "DO",
          count: "4",
          label: "Work the next useful action",
          meta: "tasks, stars, flags, project unlocks",
          sentence: "I want to do what is ready.",
          title: "Do without planning the day.",
          text: "Ready tasks, stars, flags, project unlocks, and quick wins stay together under one plain verb.",
          actions: ["Open", "Ask AI", "Send"],
          options: [
            ["Next up", "Not blocked by anything else."],
            ["Starred", "Most important by her rules."],
            ["Projects", "Sequences and dependencies."],
            ["Quick wins", "Small only if she wants them."]
          ]
        },
        buy: {
          accent: "var(--buy)",
          code: "BUY",
          count: "6",
          label: "Handle purchasing memory",
          meta: "orders, receipts, compare, deliveries",
          sentence: "I want to buy or compare something.",
          title: "Buy from memory, not from scratch.",
          text: "Purchases, receipts, links, order history, substitutions, and price comparisons become one commerce surface.",
          actions: ["Compare", "Order", "Receipt"],
          options: [
            ["Reorder same", "Use previous purchase records."],
            ["Compare", "Exact, similar, and outlier options."],
            ["Receipts", "Links, photos, order numbers."],
            ["Deliveries", "Track what is on the way."]
          ]
        },
        take: {
          accent: "var(--take)",
          code: "TAKE",
          count: "3",
          label: "Log supplements and bottles",
          meta: "taken logs, low bottles, notes",
          sentence: "I want to take or record a supplement.",
          title: "Take is its own quiet system.",
          text: "Supplement tracking stays fast, repeatable, and separate from chores. It tracks bottles without pretending to give medical advice.",
          actions: ["Taken", "Bottle", "Low"],
          options: [
            ["Taken", "One-tap log."],
            ["Bottles", "Photos and directions."],
            ["Low", "Reorder threshold signals."],
            ["Notes", "Record-only details."]
          ]
        },
        watch: {
          accent: "var(--watch)",
          code: "WATCH",
          count: "5",
          label: "Keep an eye on signals",
          meta: "deliveries, reminders, blocked tasks",
          sentence: "I want to watch what might matter.",
          title: "Watch is passive intelligence.",
          text: "The app can keep deliveries, blockers, reminders, and price watches visible without forcing action.",
          actions: ["Track", "Tune", "Dismiss"],
          options: [
            ["Deliveries", "Windows and screenshots."],
            ["Blocked", "What waits on something else."],
            ["Reminders", "Normal, nag, or quiet."],
            ["Prices", "Saved searches and changes."]
          ]
        },
        help: {
          accent: "var(--help)",
          code: "HELP",
          count: "2",
          label: "Ask or delegate safely",
          meta: "Adam, handoff, urgent alert",
          sentence: "I want help with this.",
          title: "Help without losing control.",
          text: "Assistant access is deliberate: send a task, draft a handoff, or trigger urgent help without exposing the vault.",
          actions: ["Ask", "Urgent", "Access"],
          options: [
            ["Ask Adam", "Send a selected task."],
            ["Handoff", "Readable segmented summary."],
            ["Urgent", "High-priority alert path."],
            ["Access", "Temporary or ongoing permission."]
          ]
        }
      };

      const stack = document.getElementById("stack");
      const sentence = document.getElementById("sentence");
      const dossierTitle = document.getElementById("dossierTitle");
      const dossierText = document.getElementById("dossierText");
      const actionA = document.getElementById("actionA");
      const actionB = document.getElementById("actionB");
      const actionC = document.getElementById("actionC");

      function render(activeKey) {
        stack.innerHTML = Object.entries(verbs)
          .map(([key, item]) => `
            <article class="verb-row ${key === activeKey ? "active" : ""}" style="--accent:${item.accent}">
              <button class="verb-button" data-key="${key}">
                <div class="verb-code">${item.code}</div>
                <div>
                  <strong>${item.label}</strong>
                  <span>${item.meta}</span>
                </div>
                <div class="count">${item.count}</div>
              </button>
              <div class="options">
                ${item.options.map(([title, text]) => `
                  <button class="option">
                    <strong>${title}</strong>
                    <span>${text}</span>
                  </button>
                `).join("")}
              </div>
            </article>
          `)
          .join("");
        const active = verbs[activeKey];
        sentence.textContent = active.sentence;
        dossierTitle.textContent = active.title;
        dossierText.textContent = active.text;
        [actionA.textContent, actionB.textContent, actionC.textContent] = active.actions;
        Array.from(document.querySelectorAll(".verb-button")).forEach((button) => {
          button.addEventListener("click", () => render(button.dataset.key));
        });
      }

      render("do");
    </script>
  </body>
</html>
